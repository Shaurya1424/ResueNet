apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rescuenet-mongodb-pvc
  namespace: rescuenet
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rescuenet-mongodb
  namespace: rescuenet
spec:
  serviceName: rescuenet-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: rescuenet-mongodb
  template:
    metadata:
      labels:
        app: rescuenet-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_DATABASE
              value: disasterDB
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: rescuenet-mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rescuenet-mongodb
  namespace: rescuenet
spec:
  selector:
    app: rescuenet-mongodb
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
  clusterIP: None
