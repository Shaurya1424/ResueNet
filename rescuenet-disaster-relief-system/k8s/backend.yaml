apiVersion: apps/v1
kind: Deployment
metadata:
  name: rescuenet-backend
  namespace: rescuenet
  labels:
    app: rescuenet-backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rescuenet-backend
  template:
    metadata:
      labels:
        app: rescuenet-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: backend
          image: docker.io/library/rescuenet-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: rescuenet-config
            - secretRef:
                name: rescuenet-secret
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rescuenet-backend
  namespace: rescuenet
  labels:
    app: rescuenet-backend
spec:
  type: ClusterIP
  selector:
    app: rescuenet-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rescuenet-backend-hpa
  namespace: rescuenet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rescuenet-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
