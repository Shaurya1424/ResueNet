apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rescuenet-ingress
  namespace: rescuenet
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: rescuenet.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rescuenet-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rescuenet-frontend
                port:
                  number: 80
