global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: rescuenet
    environment: local

scrape_configs:
  - job_name: "rescuenet-backend"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["backend:5000"]
        labels:
          service: backend

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
